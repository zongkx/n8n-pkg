name: Build n8n Windows EXE (2.x Compliant)

on:
  workflow_dispatch:
    inputs:
      n8n_version:
        description: 'n8n 版本 (例如: 2.26.8, 或填最新稳定版 1.123.60)'
        required: true
        default: '2.26.8'
      node_version:
        description: 'Node 运行版本 (2.x大版本必须填 20)'
        required: true
        default: '20'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ github.event.inputs.node_version }}

    - name: Install Latest Packaging Tools
      run: |
        # 使用最新的 @vercel/pkg，并直接在本地注入当前容器的 node 依赖项
        npm install -g @vercel/pkg jq

    - name: Download and Prepare n8n Source
      run: |
        # 1. 干净地全局拉取指定版本的 n8n
        npm install -g n8n@${{ github.event.inputs.n8n_version }}
        
        # 2. 找到提取路径并移入工作区
        N8N_PATH=$(npm root -g)/n8n
        mkdir -p ./dist
        cp -r $N8N_PATH/* ./dist/
        
        # 3. 动态重写 package.json 声明，强制覆盖 pkg 的静态资源加载路径
        cd ./dist
        jq '. + {
          "pkg": {
            "assets": [
              "dist/**/*",
              "nodes/**/*",
              "templates/**/*",
              "node_modules/**/*"
            ]
          }
        }' package.json > package.tmp.json && mv package.tmp.json package.json

    - name: Compiling Windows Executable
      run: |
        cd ./dist
        # 使用 npx 强行指定准确的目标架构 node${{ github.event.inputs.node_version }}-windows-x64
        # 加上 --no-bytecode 避免 V8 引擎在不同微版本号（如 20.11 和 20.18）下的字节码崩溃
        npx pkg . \
          --targets node${{ github.event.inputs.node_version }}-win-x64 \
          --no-bytecode \
          --output ../n8n-v${{ github.event.inputs.n8n_version }}-windows.exe

    - name: Upload Finished EXE
      uses: actions/upload-artifact@v4
      with:
        name: n8n-windows-executable
        path: n8n-v${{ github.event.inputs.n8n_version }}-windows.exe
