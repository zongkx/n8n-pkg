name: Build n8n Smart Launcher (ZIP + AppData Cache)

on:
  workflow_dispatch:
    inputs:
      n8n_version:
        description: 'n8n 版本 (例如: 2.26.8)'
        required: true
        default: '2.26.8'
      node_version:
        description: 'Windows Node 运行版本 (推荐 20.15.0)'
        required: true
        default: '20.15.0'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: ${{ github.event.inputs.node_version }}

    - name: Setup Go Environment
      uses: actions/setup-go@v5
      with:
        go-version: 'stable'

    # 启用 Windows 长路径支持，防止 npm install 因路径过长失败
    - name: Enable Long Paths Support
      run: |
        git config --system core.longpaths true
        Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1 -Type DWord -Force
      shell: powershell

    # 1. 准备扁平化运行环境：Node 便携版 + n8n 依赖 (已整合 isolated-vm 避坑逻辑)
    - name: Prep n8n Source & Runtime
      run: |
        New-Item -ItemType Directory -Force -Path .\build_dir\runtime
        
        # A. 下载并解压 Windows Portable Node
        $NODE_VER = "${{ github.event.inputs.node_version }}"
        Invoke-WebRequest -Uri "https://nodejs.org/dist/v$NODE_VER/node-v$NODE_VER-win-x64.zip" -OutFile node-win.zip
        Expand-Archive -Path node-win.zip -DestinationPath .\node_temp
        Copy-Item -Path ".\node_temp\node-v$NODE_VER-win-x64\*" -Destination ".\build_dir\runtime" -Recurse -Force
        
        # B. 🌟 核心修复：配置 npm 并强行拉取官方 win32-x64 预编译二进制，阻止 node-gyp 本地编译
        cd build_dir
        npm init -y
        
        # 升级全局 node-gyp 提高高版本 V8 的包树兼容性
        npm install -g node-gyp@latest
        
        # 增加金牌令箭：禁止从源码构建，若无预编译包则直接报错，防止卡死或引发 gyp ERR!
        npm install n8n@${{ github.event.inputs.n8n_version }} --omit=dev --legacy-peer-deps --build-from-source=false --fallback-to-build=false
      shell: powershell

    # 2. 将整个运行环境打包为 app.zip
    - name: Compress into app.zip
      run: |
        cd build_dir
        Compress-Archive -Path .\* -DestinationPath ..\app.zip -CompressionLevel Optimal
      shell: powershell

    # 3. 编写智能启动器 Go 源码（内嵌 app.zip）
    - name: Write Smart Launcher (Go)
      run: |
        $GoCode = @'
        package main

        import (
            _ "embed"
            "fmt"
            "os"
            "os/exec"
            "path/filepath"
        )

        //go:embed app.zip
        var appZip []byte

        const version = "${{ github.event.inputs.n8n_version }}"

        func main() {
            localAppData := os.Getenv("LOCALAPPDATA")
            targetDir := filepath.Join(localAppData, "n8n-portable", "v"+version)
            exeMarker := filepath.Join(targetDir, "runtime", "node.exe")

            // 非首次运行：直接启动
            if _, err := os.Stat(exeMarker); err == nil {
                fmt.Println("检测到本地缓存已存在，正在闪电启动 n8n v" + version + "...")
                launchN8n(targetDir)
                return
            }

            // 首次运行：解压内嵌资源到 LOCALAPPDATA
            fmt.Println("第一次运行，正在初始化运行环境，请稍候（仅限首次）...")
            os.MkdirAll(targetDir, os.ModePerm)

            archivePath := filepath.Join(targetDir, "app.zip")
            err := os.WriteFile(archivePath, appZip, 0644)
            if err != nil {
                fmt.Printf("释放资源失败: %v\n", err)
                return
            }

            fmt.Println("正在释放全量依赖至 LocalAppData (约 300~500MB)...")
            psCmd := fmt.Sprintf("Expand-Archive -Path '%s' -DestinationPath '%s' -Force", archivePath, targetDir)
            cmd := exec.Command("powershell", "-Command", psCmd)
            if err := cmd.Run(); err != nil {
                fmt.Printf("解压运行环境失败: %v\n", err)
                return
            }

            os.Remove(archivePath)
            launchN8n(targetDir)
        }

        func launchN8n(baseDir string) {
            nodeExe := filepath.Join(baseDir, "runtime", "node.exe")
            n8nScript := filepath.Join(baseDir, "node_modules", "n8n", "bin", "n8n")

            cmd := exec.Command(nodeExe, n8nScript, "start")
            cmd.Stdout = os.Stdout
            cmd.Stderr = os.Stderr
            cmd.Stdin = os.Stdin

            if err := cmd.Run(); err != nil {
                fmt.Printf("n8n 服务异常退出: %v\n", err)
            }
        }
        '@
        $GoCode | Out-File -FilePath .\main.go -Encoding utf8
      shell: powershell

    # 4. 初始化 Go 模块并编译为单文件二进制
    - name: Init Go Module & Compile Native Launcher
      run: |
        go mod init launcher
        go build -ldflags="-s -w" -o launcher.exe main.go
      shell: powershell

    # 5. 上传最终产物
    - name: Upload Smarter Launcher
      uses: actions/upload-artifact@v4
      with:
        name: n8n-smart-launcher
        path: launcher.exe
