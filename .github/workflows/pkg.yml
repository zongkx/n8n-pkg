name: Build n8n Windows EXE (Strict Version)

on:
  workflow_dispatch:
    inputs:
      n8n_version:
        description: 'n8n 版本 (建议填具体版本号，如 1.45.0)'
        required: true
        default: '1.45.0'
      node_version:
        description: '严格指定匹配的 Node 版本 (推荐 20)'
        required: true
        default: '20'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ github.event.inputs.node_version }}

    - name: Install n8n and New pkg
      run: |
        # 🌟 关键改动：安装 @vercel/pkg 代替老旧的 pkg
        npm install -g n8n@${{ github.event.inputs.n8n_version }} @vercel/pkg

    - name: Prepare pkg Entry Point
      run: |
        N8N_PATH=$(npm root -g)/n8n
        mkdir -p ./dist
        cp -r $N8N_PATH/* ./dist/
        cd ./dist
        cat <<< "$(jq '. + {"pkg": {"assets": ["dist/**/*", "nodes/**/*", "templates/**/*"]}}' package.json)" > package.json

    - name: Run pkg Build
      run: |
        cd ./dist
        # 🌟 关键改动：使用 npx pkg 调用新版命令，并强制跳过字节码
        npx pkg . --targets node${{ github.event.inputs.node_version }}-win-x64 --no-bytecode --output ../n8n-windows-${{ github.event.inputs.n8n_version }}.exe

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: n8n-windows-exe
        path: n8n-windows-${{ github.event.inputs.n8n_version }}.exe
