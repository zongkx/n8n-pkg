name: Build n8n Windows EXE (2.x Fixed)

on:
  workflow_dispatch:
    inputs:
      n8n_version:
        description: 'n8n 版本 (例如: 2.26.8)'
        required: true
        default: '2.26.8'
      node_version:
        description: 'Node 运行版本 (推荐 20)'
        required: true
        default: '20'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ github.event.inputs.node_version }}

    - name: Download and Prepare n8n Source
      run: |
        # 1. 直接安装指定版本的 n8n
        npm install -g n8n@${{ github.event.inputs.n8n_version }}
        
        # 2. 找到提取路径并移入工作区
        N8N_PATH=$(npm root -g)/n8n
        mkdir -p ./dist
        cp -r $N8N_PATH/* ./dist/
        
        # 3. 动态重写 package.json 声明静态资源路径
        cd ./dist
        jq '. + {
          "pkg": {
            "assets": [
              "dist/**/*",
              "nodes/**/*",
              "templates/**/*",
              "node_modules/**/*"
            ]
          }
        }' package.json > package.tmp.json && mv package.tmp.json package.json

    - name: Compiling Windows Executable
      run: |
        cd ./dist
        # 🌟 关键改动：直接使用 npx pkg，npm 会自动拉取官方最新且正确的打包器
        # 加上 --no-bytecode 强行绕过 V8 字节码对小版本号的挑剔
        npx pkg . \
          --targets node${{ github.event.inputs.node_version }}-win-x64 \
          --no-bytecode \
          --output ../n8n-v${{ github.event.inputs.n8n_version }}-windows.exe

    - name: Upload Finished EXE
      uses: actions/upload-artifact@v4
      with:
        name: n8n-windows-executable
        path: n8n-v${{ github.event.inputs.n8n_version }}-windows.exe
